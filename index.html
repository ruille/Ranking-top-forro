<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Forro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#08172c; color:white; }
nav { display:flex; justify-content:space-around; background:#0d2a4d; padding:10px; }
button { padding:8px; border:none; border-radius:6px; cursor:pointer; }
.section { display:none; padding:15px; }
.active { display:block; }

.card {
  background:#102a4a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input,select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.rank-item {
  background:#163c66;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.inativo {
  opacity:0.4;
  text-decoration:line-through;
}
</style>
</head>
<body>

<nav>
  <button onclick="trocar('home')">🏆 Geral</button>
  <button onclick="relatorioMensal()">📅 Mês</button>
  <button onclick="abrirADM()">👑 ADM</button>
  <button onclick="trocar('grafico')">📊</button>
</nav>

<div id="home" class="section active">
  <h2 id="titulo">Ranking</h2>
  <div id="ranking"></div>
</div>

<div id="adm" class="section">

  <div class="card">
    <h3>Produção</h3>

    <select id="nome"></select>

    <select id="turno">
      <option value="1">1º</option>
      <option value="2">2º</option>
      <option value="3">3º</option>
    </select>

    <select id="maquina"></select>

    <input id="q" type="number" placeholder="Quantidade">

    <button onclick="enviar()">Salvar</button>
  </div>

  <div class="card">
    <h3>Auxiliares</h3>

    <input id="novoNome" placeholder="Novo auxiliar">
    <button onclick="addAux()">Adicionar</button>

    <ul id="listaAux"></ul>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="logs"></div>
  </div>

</div>

<div id="grafico" class="section">
  <canvas id="chart"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-GnRzf_Km4WMnWkVEnlZCj-nASq7IzOI",
  authDomain: "topforro-4815f.firebaseapp.com",
  projectId: "topforro-4815f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dados = [];
let auxiliares = [];
let maquinas = ["Extrusora 01","Extrusora 02","Extrusora 03","Extrusora 04","Extrusora 05"];

window.trocar = function(t){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

window.abrirADM = function(){
  let s = prompt("Senha:");
  if(s==="2026deltapaython") trocar("adm");
}

// 🔥 AUXILIARES
window.addAux = async function(){
  let nome = document.getElementById("novoNome").value.trim();
  if(!nome) return;

  await addDoc(collection(db,"auxiliares"),{
    nome,
    ativo:true
  });

  document.getElementById("novoNome").value="";
}

window.toggle = async function(id,status){
  await updateDoc(doc(db,"auxiliares",id),{
    ativo:!status
  });
}

// 🔄 realtime auxiliares
onSnapshot(collection(db,"auxiliares"), snap=>{
  auxiliares=[];
  snap.forEach(doc=>{
    auxiliares.push({id:doc.id,...doc.data()});
  });
  atualizarAux();
});

// atualizar lista
function atualizarAux(){

  let select = document.getElementById("nome");
  select.innerHTML="";

  let ul = document.getElementById("listaAux");
  ul.innerHTML="";

  auxiliares.forEach(a=>{

    if(a.ativo){
      let op=document.createElement("option");
      op.value=a.nome;
      op.textContent=a.nome;
      select.appendChild(op);
    }

    let li=document.createElement("li");
    li.className = a.ativo ? "" : "inativo";

    li.innerHTML = `
      ${a.nome} (${a.ativo?"ativo":"demitido"})
      <button onclick="toggle('${a.id}',${a.ativo})">
        ${a.ativo?"Demitir":"Reativar"}
      </button>
    `;

    ul.appendChild(li);
  });

  let maq=document.getElementById("maquina");
  maq.innerHTML="";
  maquinas.forEach(m=>{
    let op=document.createElement("option");
    op.value=m;
    op.textContent=m;
    maq.appendChild(op);
  });
}

// 🔥 PRODUÇÃO
window.enviar = async function(){
  let nome=document.getElementById("nome").value;
  let turno=document.getElementById("turno").value;
  let maquina=document.getElementById("maquina").value;
  let q=Number(document.getElementById("q").value);

  if(!q) return alert("Digite quantidade");

  await addDoc(collection(db,"producao"),{
    nome,turno,maquina,quantidade:q,
    data:new Date().toISOString().split("T")[0]
  });
}

// realtime produção
onSnapshot(collection(db,"producao"), snap=>{
  dados=[];
  snap.forEach(doc=>{
    dados.push({id:doc.id,...doc.data()});
  });
  atualizar();
});

// 🔥 RANKING POR MÁQUINA
function ranking(){

  document.getElementById("titulo").innerText="Ranking por Máquina";

  let maquinasRank = {};

  dados.forEach(d=>{
    if(!maquinasRank[d.maquina]) maquinasRank[d.maquina]={};

    if(!maquinasRank[d.maquina][d.nome])
      maquinasRank[d.maquina][d.nome]=0;

    maquinasRank[d.maquina][d.nome]+=d.quantidade;
  });

  let div=document.getElementById("ranking");
  div.innerHTML="";

  Object.entries(maquinasRank).forEach(([maq,pessoas])=>{
    div.innerHTML+=`<h3>🏭 ${maq}</h3>`;

    Object.entries(pessoas)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([nome,total],i)=>{
        div.innerHTML+=`
          <div class="rank-item">
            ${i+1}º ${nome}
            <span>${total}</span>
          </div>`;
      });
  });
}

// 📅 MÊS 20→20
function mesAtual(d){
  let data=new Date(d);
  let dia=data.getDate();
  let mes=data.getMonth();
  let ano=data.getFullYear();

  if(dia<20){
    mes--;
    if(mes<0){mes=11;ano--;}
  }

  return `${mes}-${ano}`;
}

// 📅 RELATÓRIO
window.relatorioMensal = function(){

  trocar("home");
  document.getElementById("titulo").innerText="Relatório Mensal";

  let atual=mesAtual(new Date());
  let maquinasRank={};

  dados.forEach(d=>{
    if(mesAtual(d.data)!==atual) return;

    if(!maquinasRank[d.maquina]) maquinasRank[d.maquina]={};

    if(!maquinasRank[d.maquina][d.nome])
      maquinasRank[d.maquina][d.nome]=0;

    maquinasRank[d.maquina][d.nome]+=d.quantidade;
  });

  let div=document.getElementById("ranking");
  div.innerHTML="";

  Object.entries(maquinasRank).forEach(([maq,pessoas])=>{
    div.innerHTML+=`<h3>🏭 ${maq}</h3>`;

    Object.entries(pessoas)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([nome,total],i)=>{
        div.innerHTML+=`
          <div class="rank-item">
            ${i+1}º ${nome}
            <span>${total}</span>
          </div>`;
      });
  });
}

// 📝 LOGS
function logs(){
  let div=document.getElementById("logs");
  div.innerHTML="";

  dados.slice().reverse().forEach(d=>{
    div.innerHTML+=`
      <div>
        ${d.nome} - ${d.maquina} - ${d.quantidade}
        <button onclick="editar('${d.id}')">✏️</button>
        <button onclick="remover('${d.id}')">🗑️</button>
      </div>`;
  });
}

// editar
window.editar = async function(id){
  let nova=prompt("Nova máquina:");
  if(!nova) return;

  await updateDoc(doc(db,"producao",id),{
    maquina:nova
  });
}

// excluir
window.remover = async function(id){
  if(confirm("Excluir?")){
    await deleteDoc(doc(db,"producao",id));
  }
}

// gráfico
let chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[]}
});

function grafico(){
  let dias=[...new Set(dados.map(d=>d.data))].sort();
  let total={},soma=0,linha=[];

  dias.forEach(d=>total[d]=0);
  dados.forEach(d=>total[d]+=d.quantidade);

  dias.forEach(d=>{
    soma+=total[d];
    linha.push(soma);
  });

  chart.data.labels=dias;
  chart.data.datasets=[{label:"Total",data:linha}];
  chart.update();
}

function atualizar(){
  ranking();
  logs();
  grafico();
}

</script>

</body>
</html>

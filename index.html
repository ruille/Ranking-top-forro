<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Forro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#08172c; color:white; }
nav { display:flex; justify-content:space-around; background:#0d2a4d; padding:10px; }
button { border:none; padding:8px; border-radius:6px; cursor:pointer; }
.section { display:none; padding:15px; }
.active { display:block; }
.card { background:#102a4a; padding:15px; margin:10px 0; border-radius:10px; }
input,select { width:100%; padding:10px; margin:5px 0; border:none; border-radius:6px; }

.rank-item {
  background:#163c66;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.log-item {
  background:#0f2a4d;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

</style>
</head>
<body>

<nav>
  <button onclick="trocar('home')">🏆</button>
  <button onclick="abrirADM()">👑</button>
  <button onclick="trocar('grafico')">📊</button>
</nav>

<!-- RANKING -->
<div id="home" class="section active">
  <h2>Ranking por Máquina</h2>
  <div id="ranking"></div>
</div>

<!-- ADM -->
<div id="adm" class="section">

  <div class="card">
    <h3>Produção</h3>

    <select id="nome"></select>

    <select id="turno">
      <option value="1">1º</option>
      <option value="2">2º</option>
      <option value="3">3º</option>
    </select>

    <select id="maquina"></select>

    <input id="q" type="number" placeholder="Quantidade">

    <button onclick="enviar()">Salvar</button>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="logs"></div>
  </div>

</div>

<!-- GRÁFICO -->
<div id="grafico" class="section">
  <canvas id="chart"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-GnRzf_Km4WMnWkVEnlZCj-nASq7IzOI",
  authDomain: "topforro-4815f.firebaseapp.com",
  projectId: "topforro-4815f",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dados = [];
let auxiliares = ["Carlos","João","Maria"];
let maquinas = ["Extrusora 01","Extrusora 02","Extrusora 03","Extrusora 04","Extrusora 05"];

// 🔥 FUNÇÕES
window.trocar = function(t){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

window.abrirADM = function(){
  let s = prompt("Senha:");
  if(s==="2026deltapaython") window.trocar("adm");
}

// carregar selects
function carregar(){
  let n=document.getElementById("nome");
  n.innerHTML="";
  auxiliares.forEach(a=>{
    let op=document.createElement("option");
    op.value=a;
    op.textContent=a;
    n.appendChild(op);
  });

  let m=document.getElementById("maquina");
  m.innerHTML="";
  maquinas.forEach(a=>{
    let op=document.createElement("option");
    op.value=a;
    op.textContent=a;
    m.appendChild(op);
  });
}

// salvar produção
window.enviar = async function(){
  let nome=document.getElementById("nome").value;
  let turno=document.getElementById("turno").value;
  let maquina=document.getElementById("maquina").value;
  let q=Number(document.getElementById("q").value);

  if(!q) return alert("Digite quantidade");

  await addDoc(collection(db,"producao"),{
    nome,turno,maquina,quantidade:q,
    data:new Date().toISOString().split("T")[0]
  });

  document.getElementById("q").value="";
}

// 🔥 REALTIME
onSnapshot(collection(db,"producao"), snap=>{
  dados=[];
  snap.forEach(doc=>{
    dados.push({id:doc.id,...doc.data()});
  });
  atualizar();
});

// 🔥 RANKING POR MÁQUINA
function ranking(){

  let maquinasRank = {};

  dados.forEach(d=>{
    if(!maquinasRank[d.maquina]) maquinasRank[d.maquina] = {};

    if(!maquinasRank[d.maquina][d.nome])
      maquinasRank[d.maquina][d.nome] = 0;

    maquinasRank[d.maquina][d.nome] += d.quantidade;
  });

  let div = document.getElementById("ranking");
  div.innerHTML = "";

  Object.entries(maquinasRank).forEach(([maquina, pessoas])=>{

    div.innerHTML += `<h3>🏭 ${maquina}</h3>`;

    let lista = Object.entries(pessoas).sort((a,b)=>b[1]-a[1]);

    lista.forEach(([nome,total],i)=>{
      div.innerHTML += `
        <div class="rank-item">
          ${i+1}º ${nome}
          <span>${total}</span>
        </div>`;
    });

  });

}

// 🔥 LOG + EDITAR + EXCLUIR
function logs(){

  let div=document.getElementById("logs");
  div.innerHTML="";

  dados.slice().reverse().forEach(d=>{

    div.innerHTML += `
      <div class="log-item">
        ${d.nome} - ${d.maquina} - ${d.quantidade}

        <button onclick="editar('${d.id}')">✏️</button>
        <button onclick="remover('${d.id}')">🗑️</button>
      </div>
    `;
  });

}

// editar
window.editar = async function(id){

  let novaMaquina = prompt("Nova máquina:");
  if(!novaMaquina) return;

  await updateDoc(doc(db,"producao",id),{
    maquina:novaMaquina
  });

}

// excluir
window.remover = async function(id){
  if(confirm("Excluir registro?")){
    await deleteDoc(doc(db,"producao",id));
  }
}

// gráfico simples
let chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[]}
});

function grafico(){

  let dias=[...new Set(dados.map(d=>d.data))].sort();
  let total={}, soma=0, linha=[];

  dias.forEach(d=>total[d]=0);
  dados.forEach(d=>total[d]+=d.quantidade);

  dias.forEach(d=>{
    soma+=total[d];
    linha.push(soma);
  });

  chart.data.labels=dias;
  chart.data.datasets=[{label:"Total",data:linha}];
  chart.update();
}

function atualizar(){
  ranking();
  logs();
  grafico();
}

carregar();

</script>

</body>
</html>
